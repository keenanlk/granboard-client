<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NLC Darts</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      max-width: 600px;
      text-align: center;
    }
    h1 {
      font-size: 2.5rem;
      color: #fff;
      margin-bottom: 0.5rem;
    }
    .tagline {
      font-size: 1.1rem;
      color: #999;
      margin-bottom: 2rem;
    }
    p {
      line-height: 1.7;
      margin-bottom: 1.5rem;
      color: #bbb;
    }
    .links {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    a {
      color: #4dabf7;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>NLC Darts</h1>
    <p class="tagline">A custom scoring companion for GranBoard dartboards.</p>
    <p>
      NLC Darts connects to your GranBoard via Bluetooth and provides real-time
      scoring for Cricket and other dart games. Designed to be viewed from across the room
      with large, bold scores and simple controls.
    </p>
    <div class="links">
      <a href="privacy.html">Privacy Policy</a>
      <a href="support.html">Support</a>
      <a href="https://github.com/keenanlk/granboard-client">GitHub</a>
    </div>
  </div>
